apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gateway
  namespace: anadea
spec:
  ingressClassName: nginx
  rules:
    - host: anadea.ua
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 8080